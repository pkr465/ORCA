# ============================================================================
# ORCA Rules: U-Boot Bootloader Coding Style
# ============================================================================
# Comprehensive rules for Das U-Boot contribution compliance
# Reference: https://source.denx.de/u-boot/u-boot
# ============================================================================

project:
  name: "U-Boot"
  version: "2024.x"
  upstream_url: "https://source.denx.de/u-boot/u-boot"
  description: "Das U-Boot bootloader contribution rules"

# ── Coding Style Rules ──────────────────────────────────────────────────
style:
  # Indentation: tabs, 8 spaces wide
  indentation: "tabs"
  tab_width: 8
  
  # Line length: 80 character hard limit, 120 warning
  line_length: 80
  line_length_warning: 120
  
  # K&R brace style is mandatory
  brace_style: "kr"
  
  # Naming conventions enforcement
  naming:
    functions: "snake_case"
    variables: "snake_case"
    macros: "UPPER_SNAKE_CASE"
    types: "snake_case"
    enums: "UPPER_SNAKE_CASE"
    enum_values: "UPPER_SNAKE_CASE"
    struct_members: "snake_case"
  
  # Typedefs: allowed for opaque pointers and kernel-like types
  typedef_policy: "allowed_for_opaque"
  
  # Only C-style comments
  comment_style: "c_only"
  
  # Function body size limits
  max_function_lines: 60
  
  # Goto usage: centralized error handling only
  goto_policy: "centralized_error_handling"
  
  # Parenthesis spacing rules
  spaces_inside_parens: false
  space_after_keywords: true
  keywords_requiring_space:
    - "if"
    - "switch"
    - "case"
    - "for"
    - "do"
    - "while"
    - "return"

# ── License Compliance Rules ────────────────────────────────────────────
license:
  # SPDX identifiers are required
  required_spdx: true
  default_license: "GPL-2.0-or-later"
  
  # Allowed licenses for U-Boot (more permissive than kernel)
  allowed_licenses:
    - "GPL-2.0-only"
    - "GPL-2.0-or-later"
    - "BSD-2-Clause"
    - "BSD-3-Clause"
    - "MIT"
    - "ISC"
    - "X11"
  
  # Incompatible licenses
  incompatible_licenses:
    - "GPL-3.0-only"
    - "GPL-3.0-or-later"
    - "AGPL-3.0-only"
  
  # License header format: SPDX identifier only
  header_format: "spdx_only"
  
  # Copyright notice pattern (both (C) and (c) accepted)
  copyright_pattern: "Copyright \\(C\\|\\(c\\)\\) \\d{4}"
  require_copyright: true

# ── Code Structure Rules ────────────────────────────────────────────────
structure:
  # Include guards: #ifndef style
  include_guard_style: "ifndef"
  guard_naming: "path_based"
  
  # Include file ordering
  include_order:
    - "own"
    - "system"
    - "project"
  
  # Maximum include depth (bootloader may have deeper deps)
  max_include_depth: 12
  
  # No extern in .c files
  no_extern_in_c: true
  
  # Public APIs must have header declarations
  require_header_for_exports: true
  
  # File naming conventions
  file_naming: "snake_case"
  
  # Allowed file extensions (includes assembly)
  allowed_extensions:
    source: [".c", ".S"]
    header: [".h"]

# ── Patch Format Rules ──────────────────────────────────────────────────
patch:
  # Context lines in unified diff
  context_lines: 3
  
  # Maximum patch size (slightly larger than kernel)
  max_patch_size: 2000
  
  # Patch submission requirements
  require_signed_off_by: true
  require_cover_letter_for_series: true
  
  # Subject line format
  subject_prefix: "PATCH"
  subject_max_length: 72
  body_max_line_length: 75
  
  # Formatting requirements
  require_blank_after_subject: true
  require_imperative_mood: true
  
  # Developer Certificate of Origin required
  require_dco: true
  
  # Required trailer lines
  required_trailers:
    - "Signed-off-by"
  
  # No prohibited trailers
  prohibited_trailers: []

# ── Architecture-Specific Rules ─────────────────────────────────────────
architectures:
  # ARM architecture support
  arm:
    require_compiler_flags: true
    require_register_preservation: true
    
  # ARM64 architecture support
  arm64:
    require_compiler_flags: true
    require_register_preservation: true
    
  # x86/x86_64 architecture support
  x86:
    require_compiler_flags: true
    require_asm_comments: true
    
  # PowerPC architecture support
  powerpc:
    require_compiler_flags: true
    require_register_preservation: true

# ── Board Configuration Rules ───────────────────────────────────────────
board_configs:
  # Configuration file naming convention
  naming: "board_<vendor>_<model>.h"
  
  # Required board configuration macros
  required_macros:
    - "CONFIG_SYS_CBSIZE"
    - "CONFIG_SYS_MALLOC_LEN"
    - "CONFIG_SYS_LOAD_ADDR"
  
  # No hardcoded magic numbers
  require_named_constants: true

# ── Severity Overrides ──────────────────────────────────────────────────
severity_overrides:
  # Style violations
  style_indentation_spaces: "medium"
  style_line_length: "low"
  style_brace_kr: "medium"
  style_naming_function: "medium"
  style_typedef: "low"
  style_comment_cpp: "high"
  
  # License violations
  license_spdx_missing: "high"
  license_spdx_invalid: "critical"
  license_copyright_missing: "high"
  license_incompatible: "critical"
  
  # Structure violations
  structure_include_guard_missing: "high"
  structure_extern_in_c: "medium"
  
  # Patch violations
  patch_signed_off_by: "high"
  patch_subject_length: "medium"
  patch_dco_missing: "critical"
  
  # Architecture violations
  arch_compiler_flags_missing: "medium"
  arch_register_preservation: "high"
  
  # Configuration violations
  board_config_missing_macro: "high"
  board_config_magic_number: "medium"
